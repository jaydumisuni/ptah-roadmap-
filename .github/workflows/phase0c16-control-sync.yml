name: Phase 0C-16 control-book sync

on:
  pull_request:
    paths:
      - "tools/apply_phase0c16_control_sync.py"
      - ".github/workflows/phase0c16-control-sync.yml"
      - "MASTER_PLAN.md"
      - "IMPLEMENTATION_ROADMAP.md"
      - "planning/**"
      - "AI_HANDOFF.md"
      - "master-plan-index.json"
      - "decisions/ADR-0034-MASTER-PLAN-ROADMAP-AND-HANDOFF-AUTHORITY.md"
      - "work-packages/PHASE-0C-16-MASTER-PLAN-AND-IMPLEMENTATION-ROADMAP-CLOSURE.md"

permissions:
  contents: write

env:
  PTAH_HEAD_REF: ${{ github.event.pull_request.head.ref }}
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha }}

jobs:
  apply-control-sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out exact planning branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_HEAD_REF }}
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify exact starting head
        run: test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"

      - name: Apply guarded control-book synchronization
        run: python3 tools/apply_phase0c16_control_sync.py

      - name: Verify non-authorization and expected changed files
        run: |
          python3 - <<'PY'
          from pathlib import Path
          current = Path("CURRENT_STATE.md").read_text(encoding="utf-8")
          adr = Path("decisions/ADR-0033-FIRST-VERTICAL-SLICE-HOST-LICENCE-LAYOUT-BACKENDS.md").read_text(encoding="utf-8")
          index = Path("master-plan-index.json").read_text(encoding="utf-8")
          if "**Runtime implementation:** NOT AUTHORIZED" not in current:
              raise SystemExit("runtime non-authorization missing")
          if "**Runtime implementation:** AUTHORIZED" in current:
              raise SystemExit("runtime authorization appeared")
          if "Status: proposed" not in adr:
              raise SystemExit("ADR-0033 changed from proposed")
          if '"runtime_implementation_authorized": false' not in index:
              raise SystemExit("machine index authorization boundary missing")
          PY
          git add README.md MEMORY_PROTOCOL.md DONOR_RECOVERY.md MASTER_ROADMAP.md \
            DECISIONS.md PROGRESS.md CURRENT_STATE.md \
            decisions/ADR-0033-FIRST-VERTICAL-SLICE-HOST-LICENCE-LAYOUT-BACKENDS.md
          test "$(git diff --cached --name-only | wc -l)" -eq 8
          git diff --cached --stat

      - name: Commit synchronized control book
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Synchronize control book with complete Master Plan"
          git push origin "HEAD:${PTAH_HEAD_REF}"
