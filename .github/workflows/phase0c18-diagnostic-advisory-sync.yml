name: Phase 0C-18 Diagnostic and Worker Sync

on:
  pull_request:
    paths:
      - "tools/apply_phase0c18_diagnostic_advisory_sync.py"
      - "tools/apply_phase0c18_diagnostic_advisory_sync_v2.py"
      - "tools/check_platform_diagnostic_advisory.py"
      - "tools/test_check_platform_diagnostic_advisory.py"
      - ".github/workflows/phase0c18-diagnostic-advisory-sync.yml"

permissions:
  contents: write

env:
  PTAH_HEAD_REF: ${{ github.event.pull_request.head.ref }}
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha }}

jobs:
  synchronize-candidate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out exact candidate branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_HEAD_REF }}
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify exact starting head
        run: test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"

      - name: Apply guarded candidate synchronization
        run: |
          mkdir -p conformance/reports/phase0c18-sync
          set -o pipefail
          python3 tools/apply_phase0c18_diagnostic_advisory_sync_v2.py 2>&1 \
            | tee conformance/reports/phase0c18-sync/transform.txt

      - name: Run candidate regressions and validators
        run: |
          set -o pipefail
          python3 tools/test_check_platform_diagnostic_advisory.py -v 2>&1 \
            | tee conformance/reports/phase0c18-sync/diagnostic-worker-regressions.txt
          python3 tools/check_platform_diagnostic_advisory.py --repo-root . 2>&1 \
            | tee conformance/reports/phase0c18-sync/diagnostic-worker-validator.txt
          python3 tools/test_check_master_plan_closure.py -v 2>&1 \
            | tee conformance/reports/phase0c18-sync/master-plan-regressions.txt
          python3 tools/check_master_plan_closure.py --repo-root . 2>&1 \
            | tee conformance/reports/phase0c18-sync/master-plan-validator.txt

      - name: Upload synchronization diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: phase0c18-sync-${{ env.PTAH_EXACT_SHA }}-${{ github.run_attempt }}
          path: conformance/reports/phase0c18-sync/
          if-no-files-found: error
          retention-days: 30

      - name: Verify changed-file boundary
        run: |
          expected=$(cat <<'EOF'
          AI_HANDOFF.md
          CURRENT_STATE.md
          DECISIONS.md
          IMPLEMENTATION_ROADMAP.md
          MASTER_PLAN.md
          PROGRESS.md
          master-plan-index.json
          tools/check_platform_diagnostic_advisory.py
          tools/test_check_platform_diagnostic_advisory.py
          EOF
          )
          actual=$(git diff --name-only | sort)
          test "$actual" = "$(printf '%s\n' "$expected" | sort)"
          grep -Fq '**Runtime implementation:** NOT AUTHORIZED' CURRENT_STATE.md
          ! grep -Fq '**Runtime implementation:** AUTHORIZED' CURRENT_STATE.md
          grep -Fq 'Status: proposed' decisions/ADR-0033-FIRST-VERTICAL-SLICE-HOST-LICENCE-LAYOUT-BACKENDS.md
          grep -Fq '**Status:** COMPLETE AND FROZEN' DONOR_RECOVERY.md
          grep -A5 '^## AF03$' archive/CAMPAIGN-001-FORMATION-MANIFEST.md | grep -Fq -- '- status: READY / NOT STARTED'

      - name: Commit synchronized candidate records
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            AI_HANDOFF.md \
            CURRENT_STATE.md \
            DECISIONS.md \
            IMPLEMENTATION_ROADMAP.md \
            MASTER_PLAN.md \
            PROGRESS.md \
            master-plan-index.json \
            tools/check_platform_diagnostic_advisory.py \
            tools/test_check_platform_diagnostic_advisory.py
          git commit -m "Synchronize diagnostic and ten-for-two candidate"
          git push origin "HEAD:${PTAH_HEAD_REF}"
