name: Archive Campaign 001 AF04-AF10 Acceptance

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  archive-campaign-acceptance:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out exact accepted-state head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_EXACT_SHA }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify exact checked-out head
        run: test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"

      - name: Run accepted-state adversarial regressions
        run: |
          mkdir -p conformance/reports/archive-campaign-001-acceptance
          set -o pipefail
          python3 tools/test_check_archive_campaign_acceptance.py -v 2>&1 \
            | tee conformance/reports/archive-campaign-001-acceptance/regressions.txt

      - name: Validate accepted-state promotion
        run: |
          set -o pipefail
          python3 tools/check_archive_campaign_acceptance.py \
            --repo-root . \
            --output conformance/reports/archive-campaign-001-acceptance/validation.json \
            2>&1 | tee conformance/reports/archive-campaign-001-acceptance/validator-output.txt

      - name: Bind accepted-state evidence to exact head
        run: |
          python3 - <<'PY'
          import hashlib, json, os, subprocess
          from datetime import datetime, timezone
          from pathlib import Path
          root = Path("conformance/reports/archive-campaign-001-acceptance")
          report_path = root / "validation.json"
          report = json.loads(report_path.read_text(encoding="utf-8"))
          expected = os.environ["PTAH_EXACT_SHA"]
          checked = subprocess.run(["git","rev-parse","HEAD"],capture_output=True,text=True,check=True).stdout.strip()
          evidence = {
              "schema_version":"1.0.0",
              "record_type":"ptah.archive_campaign_001_acceptance_exact_head_evidence",
              "created_at":datetime.now(timezone.utc).isoformat(timespec="seconds"),
              "implementation_commit":expected,
              "checked_out_commit":checked,
              "exact_head_match":checked == expected,
              "validation_report_sha256":hashlib.sha256(report_path.read_bytes()).hexdigest(),
              **report,
          }
          (root / "exact-head-evidence.json").write_text(json.dumps(evidence,indent=2)+"\n",encoding="utf-8")
          if not evidence["exact_head_match"]:
              raise SystemExit("accepted state did not test exact head")
          if evidence["status"] != "campaign_acceptance_candidate_valid_non_authorizing":
              raise SystemExit("accepted-state status invalid")
          expected_values = {
              "promoted_formation_count":7,
              "campaign_formation_count":10,
              "campaign_obligation_count":98,
              "campaign_accepted_archive_record_count":91,
              "campaign_blocked_record_count":7,
              "campaign_remaining_evidence_count":0,
              "global_control_state_bound":False,
          }
          for key, value in expected_values.items():
              if evidence.get(key) != value:
                  raise SystemExit(f"accepted-state evidence mismatch: {key}")
          for key in ("phase_0a_reopened","p01_closed","adr_0033_accepted","runtime_implementation_authorized"):
              if evidence.get(key) is not False:
                  raise SystemExit(f"accepted-state authority boundary violated: {key}")
          PY

      - name: Upload exact-head accepted-state evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: archive-campaign-001-acceptance-${{ env.PTAH_EXACT_SHA }}-${{ github.run_attempt }}
          path: conformance/reports/archive-campaign-001-acceptance/
          if-no-files-found: error
          retention-days: 30
