name: Archive Campaign 001 AF02

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  af02-archive-closure:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out exact AF02 head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_EXACT_SHA }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify exact checked-out head
        run: test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"

      - name: Run adversarial AF02 regressions
        run: |
          mkdir -p conformance/reports/archive-campaign-001-af02
          set -o pipefail
          python3 tools/test_check_archive_af02.py -v 2>&1 \
            | tee conformance/reports/archive-campaign-001-af02/regressions.txt

      - name: Validate AF02 candidate closure
        run: |
          set -o pipefail
          python3 tools/check_archive_af02.py \
            --repo-root . \
            --output conformance/reports/archive-campaign-001-af02/af02-validation.json \
            2>&1 | tee conformance/reports/archive-campaign-001-af02/validator-output.txt

      - name: Bind AF02 evidence to exact head
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path("conformance/reports/archive-campaign-001-af02")
          report_path = root / "af02-validation.json"
          report = json.loads(report_path.read_text(encoding="utf-8"))
          expected = os.environ["PTAH_EXACT_SHA"]
          checked_out = subprocess.run(
              ["git", "rev-parse", "HEAD"], capture_output=True, text=True, check=True
          ).stdout.strip()
          evidence = {
              "schema_version": "1.0.0",
              "record_type": "ptah.archive_campaign_af02_exact_head_evidence",
              "created_at": datetime.now(timezone.utc).isoformat(timespec="seconds"),
              "implementation_commit": expected,
              "checked_out_commit": checked_out,
              "exact_head_match": checked_out == expected,
              "validation_report_sha256": hashlib.sha256(report_path.read_bytes()).hexdigest(),
              **report,
          }
          (root / "exact-head-evidence.json").write_text(
              json.dumps(evidence, indent=2) + "\n", encoding="utf-8"
          )
          if not evidence["exact_head_match"]:
              raise SystemExit("AF02 did not test the exact head")
          if evidence["status"] != "candidate_complete_valid_non_authorizing":
              raise SystemExit("AF02 candidate validation status is invalid")
          expected_values = {
              "record_count": 10,
              "accepted_archive_record_count": 10,
              "blocked_record_count": 0,
              "primary_worker_count": 10,
              "verifier_worker_count": 10,
              "checkpoint_count": 2,
              "remaining_evidence_count": 0,
          }
          for key, value in expected_values.items():
              if evidence.get(key) != value:
                  raise SystemExit(f"AF02 evidence mismatch: {key}")
          for key in (
              "phase_0a_reopened",
              "adr_0033_accepted",
              "runtime_implementation_authorized",
              "af03_authorized",
          ):
              if evidence.get(key) is not False:
                  raise SystemExit(f"AF02 non-authorizing boundary violated: {key}")
          PY

      - name: Upload exact-head AF02 evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: archive-campaign-001-af02-${{ env.PTAH_EXACT_SHA }}-${{ github.run_attempt }}
          path: conformance/reports/archive-campaign-001-af02/
          if-no-files-found: error
          retention-days: 30
