name: Phase 0C-16 Master Plan acceptance apply

on:
  pull_request:
    paths:
      - "tools/apply_phase0c16_plan_acceptance.py"
      - "tools/fix_phase0c16_acceptance_commands.py"
      - ".github/workflows/phase0c16-plan-acceptance-apply.yml"

permissions:
  contents: write

env:
  PTAH_HEAD_REF: ${{ github.event.pull_request.head.ref }}
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha }}

jobs:
  apply-plan-acceptance:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out exact acceptance branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_HEAD_REF }}
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify exact starting head
        run: test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"

      - name: Apply guarded plan acceptance
        run: |
          mkdir -p conformance/reports/plan-acceptance
          set -o pipefail
          python3 tools/apply_phase0c16_plan_acceptance.py 2>&1 \
            | tee conformance/reports/plan-acceptance/transform.txt
          python3 tools/fix_phase0c16_acceptance_commands.py 2>&1 \
            | tee conformance/reports/plan-acceptance/command-format.txt

      - name: Run accepted-state regressions and validator
        run: |
          set -o pipefail
          python3 tools/test_check_master_plan_closure.py -v 2>&1 \
            | tee conformance/reports/plan-acceptance/regressions.txt
          python3 tools/check_master_plan_closure.py --repo-root . \
            --output conformance/reports/plan-acceptance/validation.json 2>&1 \
            | tee conformance/reports/plan-acceptance/validator.txt

      - name: Upload acceptance diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: phase-0c-16-plan-acceptance-${{ env.PTAH_EXACT_SHA }}-${{ github.run_attempt }}
          path: conformance/reports/plan-acceptance/
          if-no-files-found: error
          retention-days: 30

      - name: Verify acceptance and non-authorization
        run: |
          grep -F 'Status: accepted product and operating authority' MASTER_PLAN.md
          grep -F 'Status: accepted delivery authority' IMPLEMENTATION_ROADMAP.md
          grep -F 'Status: accepted' decisions/ADR-0034-MASTER-PLAN-ROADMAP-AND-HANDOFF-AUTHORITY.md
          grep -F 'Status: proposed' decisions/ADR-0033-FIRST-VERTICAL-SLICE-HOST-LICENCE-LAYOUT-BACKENDS.md
          grep -F '**Runtime implementation:** NOT AUTHORIZED' CURRENT_STATE.md
          ! grep -F '**Runtime implementation:** AUTHORIZED' CURRENT_STATE.md
          grep -F 'python3 tools/run_pinned_host_proof.py \' CURRENT_STATE.md
          grep -F 'python3 tools/run_pinned_host_proof.py \' AI_HANDOFF.md
          grep -F 'python3 tools/retain_verified_pinned_host_evidence.py \' CURRENT_STATE.md
          grep -F 'python3 tools/retain_verified_pinned_host_evidence.py \' AI_HANDOFF.md
          python3 - <<'PY'
          import json
          from pathlib import Path
          value = json.loads(Path("master-plan-index.json").read_text(encoding="utf-8"))
          if value["active_work_unit"] != "P01-physical-host-and-ADR-0033-closure":
              raise SystemExit("P01 was not selected")
          if value["runtime_implementation_authorized"] is not False:
              raise SystemExit("acceptance attempted runtime authorization")
          if len(value["authorization_blockers"]) != 6:
              raise SystemExit("remaining blocker count mismatch")
          PY

      - name: Stage reviewed acceptance records
        run: |
          git add \
            MASTER_PLAN.md \
            IMPLEMENTATION_ROADMAP.md \
            README.md \
            AI_HANDOFF.md \
            CURRENT_STATE.md \
            PROGRESS.md \
            DECISIONS.md \
            master-plan-index.json \
            planning/REQUIREMENTS-AND-DECISIONS-RECOVERY.md \
            planning/MASTER-PLAN-RECONCILIATION.md \
            planning/PHYSICAL-HOST-TO-AUTHORIZATION-CLOSURE.md \
            decisions/ADR-0033-FIRST-VERTICAL-SLICE-HOST-LICENCE-LAYOUT-BACKENDS.md \
            decisions/ADR-0034-MASTER-PLAN-ROADMAP-AND-HANDOFF-AUTHORITY.md \
            work-packages/PHASE-0C-16-MASTER-PLAN-AND-IMPLEMENTATION-ROADMAP-CLOSURE.md \
            tools/check_master_plan_closure.py \
            tools/test_check_master_plan_closure.py \
            .github/workflows/phase0c16-master-plan-closure.yml
          test "$(git diff --cached --name-only | wc -l)" -eq 17
          git diff --cached --stat

      - name: Commit reviewed plan acceptance
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Accept Ptah Master Plan and implementation roadmap"
          git push origin "HEAD:${PTAH_HEAD_REF}"
