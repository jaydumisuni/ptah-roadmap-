name: Phase 0C-16 acceptance merge sync

on:
  pull_request:
    paths:
      - "tools/apply_phase0c16_acceptance_merge_sync.py"
      - ".github/workflows/phase0c16-acceptance-merge-sync.yml"

permissions:
  contents: write

env:
  PTAH_HEAD_REF: ${{ github.event.pull_request.head.ref }}
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha }}

jobs:
  sync-acceptance-merge:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out exact sync branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_HEAD_REF }}
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify exact starting head
        run: test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"

      - name: Apply guarded operative merge sync
        run: python3 tools/apply_phase0c16_acceptance_merge_sync.py

      - name: Validate accepted planning authority remains intact
        run: |
          python3 tools/test_check_master_plan_closure.py -v
          python3 tools/check_master_plan_closure.py --repo-root .
          grep -F '66bd2410d4c777cd3fd3278107f40fe425e875e9' AI_HANDOFF.md
          grep -F '66bd2410d4c777cd3fd3278107f40fe425e875e9' CURRENT_STATE.md
          grep -F 'Status: proposed' decisions/ADR-0033-FIRST-VERTICAL-SLICE-HOST-LICENCE-LAYOUT-BACKENDS.md
          grep -F '**Runtime implementation:** NOT AUTHORIZED' CURRENT_STATE.md
          ! grep -F '**Runtime implementation:** AUTHORIZED' CURRENT_STATE.md
          python3 - <<'PY'
          import json
          from pathlib import Path
          value = json.loads(Path("master-plan-index.json").read_text(encoding="utf-8"))
          evidence = value["acceptance_evidence"]
          if evidence["operative_acceptance_merge"] != "66bd2410d4c777cd3fd3278107f40fe425e875e9":
              raise SystemExit("operative acceptance merge binding mismatch")
          if value["runtime_implementation_authorized"] is not False:
              raise SystemExit("merge sync attempted runtime authorization")
          if len(value["authorization_blockers"]) != 6:
              raise SystemExit("remaining blocker count changed")
          PY

      - name: Stage durable merge-binding records
        run: |
          git add \
            CURRENT_STATE.md \
            AI_HANDOFF.md \
            master-plan-index.json \
            decisions/ADR-0034-MASTER-PLAN-ROADMAP-AND-HANDOFF-AUTHORITY.md \
            work-packages/PHASE-0C-16-MASTER-PLAN-AND-IMPLEMENTATION-ROADMAP-CLOSURE.md \
            planning/MASTER-PLAN-AUTHORITY-ACCEPTANCE-MERGE.md
          test "$(git diff --cached --name-only | wc -l)" -eq 6
          git diff --cached --stat

      - name: Commit durable operative merge binding
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Bind operative Master Plan authority acceptance merge"
          git push origin "HEAD:${PTAH_HEAD_REF}"
