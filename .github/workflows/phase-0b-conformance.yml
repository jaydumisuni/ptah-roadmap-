name: Phase 0B Contract Conformance

on:
  pull_request:
    paths:
      - 'schemas/phase-0b/**'
      - 'state-machines/phase-0b/**'
      - 'conformance/**'
      - '.github/workflows/phase-0b-conformance.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: conformance/harness/pyproject.toml
      - name: Install harness
        run: python -m pip install ./conformance/harness
      - name: Run harness unit tests
        working-directory: conformance/harness
        run: python -m unittest -v test_ptah_conformance.py
      - name: Run repository conformance
        run: ptah-conformance --root . --report conformance/reports/phase-0b-conformance.json
      - name: Upload immutable run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-0b-conformance-${{ github.sha }}
          path: conformance/reports/phase-0b-conformance.json
          if-no-files-found: error
          retention-days: 30
