name: Phase 0C-19 Deep Workspace Roadmap Reconciliation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reconcile:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Verify checked-out head
        shell: bash
        run: |
          set -euo pipefail
          expected='${{ github.event.pull_request.head.sha || github.sha }}'
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$expected"

      - name: Apply guarded canonical synchronization
        shell: bash
        run: |
          set -o pipefail
          mkdir -p evidence/phase0c19
          python3 tools/apply_phase0c19_deep_workspace_sync_v2.py 2>&1 | tee evidence/phase0c19/synchronization.txt

      - name: Run candidate regressions
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=tools python3 -m unittest -v tools/test_check_phase0c19_deep_workspace_reconciliation.py 2>&1 | tee evidence/phase0c19/regressions.txt

      - name: Run standalone candidate validator
        run: |
          python3 tools/check_phase0c19_deep_workspace_reconciliation.py \
            --repo-root . \
            --output evidence/phase0c19/validation.json

      - name: Enforce exact synchronization boundary
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | sort > /tmp/changed.txt
          cat > /tmp/allowed.txt <<'EOF'
          AI_HANDOFF.md
          CURRENT_STATE.md
          DECISIONS.md
          IMPLEMENTATION_ROADMAP.md
          MASTER_PLAN.md
          PROGRESS.md
          master-plan-index.json
          planning/MASTER-PLAN-RECONCILIATION.md
          planning/P01-ADR-0033-PROOF-CANDIDATE-SELECTION.md
          planning/PHYSICAL-HOST-TO-AUTHORIZATION-CLOSURE.md
          planning/REQUIREMENTS-AND-DECISIONS-RECOVERY.md
          EOF
          sort -o /tmp/allowed.txt /tmp/allowed.txt
          if comm -23 /tmp/changed.txt /tmp/allowed.txt | grep -q .; then
            echo 'Unexpected synchronized files:'
            comm -23 /tmp/changed.txt /tmp/allowed.txt
            exit 1
          fi

      - name: Commit synchronized candidate authority
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          mapfile -t changed < <(git diff --name-only)
          if [ "${#changed[@]}" -eq 0 ]; then
            echo 'Canonical state already synchronized.'
            exit 0
          fi
          git config user.name 'ptah-evidence-bot'
          git config user.email 'ptah-evidence-bot@users.noreply.github.com'
          git add -- \
            AI_HANDOFF.md \
            CURRENT_STATE.md \
            DECISIONS.md \
            IMPLEMENTATION_ROADMAP.md \
            MASTER_PLAN.md \
            PROGRESS.md \
            master-plan-index.json \
            planning/MASTER-PLAN-RECONCILIATION.md \
            planning/P01-ADR-0033-PROOF-CANDIDATE-SELECTION.md \
            planning/PHYSICAL-HOST-TO-AUTHORIZATION-CLOSURE.md \
            planning/REQUIREMENTS-AND-DECISIONS-RECOVERY.md
          git commit -m 'Synchronize deep Workspace study into planning load'
          git push origin "HEAD:${BRANCH}"

      - name: Retain exact-head candidate evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: phase0c19-deep-workspace-roadmap-candidate
          path: evidence/phase0c19
          if-no-files-found: warn
          retention-days: 30
