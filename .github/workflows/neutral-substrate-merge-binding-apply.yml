name: Neutral Ptah Substrate Merge Binding Apply

on:
  pull_request:
    paths:
      - "tools/apply_neutral_substrate_merge_binding.py"
      - ".github/workflows/neutral-substrate-merge-binding-apply.yml"

permissions:
  contents: write

env:
  PTAH_HEAD_REF: ${{ github.event.pull_request.head.ref }}
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha }}

jobs:
  bind-merge:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out exact binding branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_HEAD_REF }}
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify exact starting head
        run: test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"

      - name: Apply guarded merge binding
        run: python3 tools/apply_neutral_substrate_merge_binding.py

      - name: Run permanent Master Plan validation
        run: |
          python3 tools/test_check_master_plan_closure.py -v
          python3 tools/check_master_plan_closure.py --repo-root .

      - name: Verify changed-file boundary
        run: |
          expected=$(cat <<'EOF'
          AI_HANDOFF.md
          CURRENT_STATE.md
          master-plan-index.json
          tools/check_master_plan_closure.py
          tools/test_check_master_plan_closure.py
          EOF
          )
          actual=$(git diff --name-only | sort)
          test "$actual" = "$(printf '%s\n' "$expected" | sort)"
          grep -Fq 'fc8ac4c42a3358da37c4866879543a5d7c4d1885' AI_HANDOFF.md
          grep -Fq 'fc8ac4c42a3358da37c4866879543a5d7c4d1885' CURRENT_STATE.md
          grep -Fq '**Runtime implementation:** NOT AUTHORIZED' CURRENT_STATE.md
          ! grep -Fq '**Runtime implementation:** AUTHORIZED' CURRENT_STATE.md
          grep -Fq 'Status: proposed' decisions/ADR-0033-FIRST-VERTICAL-SLICE-HOST-LICENCE-LAYOUT-BACKENDS.md

      - name: Commit bound recovery records
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AI_HANDOFF.md CURRENT_STATE.md master-plan-index.json tools/check_master_plan_closure.py tools/test_check_master_plan_closure.py
          git commit -m "Bind neutral substrate correction merge"
          git push origin "HEAD:${PTAH_HEAD_REF}"
