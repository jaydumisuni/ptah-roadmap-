name: Archive Campaign 001 AF03

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  af03-operative-campaign:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out exact operative head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_EXACT_SHA }}
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Verify exact checked-out head
        run: test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"
      - name: Validate AF03 inside operative campaign
        run: |
          mkdir -p conformance/reports/archive-campaign-001-af03
          set -o pipefail
          python3 tools/test_check_archive_campaign_complete.py -v 2>&1 | tee conformance/reports/archive-campaign-001-af03/regressions.txt
          python3 tools/check_archive_campaign_complete.py --repo-root . --output conformance/reports/archive-campaign-001-af03/validation.json 2>&1 | tee conformance/reports/archive-campaign-001-af03/validator-output.txt
      - name: Upload AF03 operative evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: archive-campaign-001-af03-${{ env.PTAH_EXACT_SHA }}-${{ github.run_attempt }}
          path: conformance/reports/archive-campaign-001-af03/
          if-no-files-found: error
          retention-days: 30
