name: Phase 0C-14 roadmap sync generator

on:
  pull_request:
    paths:
      - "tools/generate_phase0c14_licence_sync.py"
      - ".github/workflows/phase0c14-roadmap-sync-generator.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  generate-roadmap-sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out exact generator head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_EXACT_SHA }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Generate guarded synchronization outputs
        run: |
          mkdir -p generated-sync
          python tools/generate_phase0c14_licence_sync.py \
            > generated-sync/generator-output.txt 2>&1
          cat generated-sync/generator-output.txt

      - name: Verify exact source and non-authorization boundary
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          expected = os.environ["PTAH_EXACT_SHA"]
          checked_out = subprocess.run(
              ["git", "rev-parse", "HEAD"],
              capture_output=True,
              text=True,
              check=True,
          ).stdout.strip()
          manifest = json.loads(
              Path("generated-sync/sync-manifest.json").read_text(encoding="utf-8")
          )
          if checked_out != expected:
              raise SystemExit("generator did not check out exact head")
          if manifest["source_commit"] != "d9f65fa5c56e3ec3fd608358c3146cac6ed9eaa5":
              raise SystemExit("roadmap source commit changed")
          if manifest["runtime_implementation_authorized"] is not False:
              raise SystemExit("roadmap sync cannot authorize runtime")
          if len(manifest["files"]) != 4:
              raise SystemExit("unexpected generated file count")
          PY

      - name: Upload generated roadmap synchronization
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: phase-0c-14-roadmap-sync-${{ env.PTAH_EXACT_SHA }}-${{ github.run_attempt }}
          path: generated-sync/
          if-no-files-found: error
          retention-days: 30
