name: Phase 0C-14 roadmap sync applicator

on:
  pull_request:
    paths:
      - "tools/generate_phase0c14_licence_sync.py"
      - ".github/workflows/phase0c14-roadmap-sync-generator.yml"

permissions:
  contents: write

env:
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha }}
  PTAH_HEAD_REF: ${{ github.event.pull_request.head.ref }}

jobs:
  apply-roadmap-sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out exact generator branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_HEAD_REF }}
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify exact starting head
        run: |
          test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"

      - name: Generate guarded synchronization outputs
        run: |
          python tools/generate_phase0c14_licence_sync.py

      - name: Verify manifest and proposed control boundary
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path("generated-sync")
          manifest = json.loads((root / "sync-manifest.json").read_text(encoding="utf-8"))
          if manifest["source_commit"] != "d9f65fa5c56e3ec3fd608358c3146cac6ed9eaa5":
              raise SystemExit("roadmap source commit changed")
          if manifest["runtime_implementation_authorized"] is not False:
              raise SystemExit("roadmap sync cannot authorize runtime")
          if len(manifest["files"]) != 4:
              raise SystemExit("unexpected generated file count")
          for item in manifest["files"]:
              path = root / item["path"]
              raw = path.read_bytes()
              if len(raw) != item["size_bytes"]:
                  raise SystemExit(f"size mismatch: {item['path']}")
              if hashlib.sha256(raw).hexdigest() != item["sha256"]:
                  raise SystemExit(f"digest mismatch: {item['path']}")
          current = (root / "CURRENT_STATE.md").read_text(encoding="utf-8")
          if "**Runtime implementation:** NOT AUTHORIZED" not in current:
              raise SystemExit("canonical runtime block is missing")
          if "**Runtime implementation:** AUTHORIZED" in current:
              raise SystemExit("generator attempted runtime authorization")
          for item in manifest["files"]:
              text = (root / item["path"]).read_text(encoding="utf-8")
              if "<<<<<<<" in text or ">>>>>>>" in text:
                  raise SystemExit(f"merge marker found: {item['path']}")
          PY

      - name: Stage verified control records
        run: |
          cp generated-sync/CURRENT_STATE.md CURRENT_STATE.md
          cp generated-sync/PROGRESS.md PROGRESS.md
          cp generated-sync/decisions/ADR-0033-FIRST-VERTICAL-SLICE-HOST-LICENCE-LAYOUT-BACKENDS.md \
            decisions/ADR-0033-FIRST-VERTICAL-SLICE-HOST-LICENCE-LAYOUT-BACKENDS.md
          cp generated-sync/work-packages/PHASE-0C-14-APACHE-2.0-OWNER-ACCEPTANCE.md \
            work-packages/PHASE-0C-14-APACHE-2.0-OWNER-ACCEPTANCE.md
          rm -rf generated-sync
          git add CURRENT_STATE.md PROGRESS.md \
            decisions/ADR-0033-FIRST-VERTICAL-SLICE-HOST-LICENCE-LAYOUT-BACKENDS.md \
            work-packages/PHASE-0C-14-APACHE-2.0-OWNER-ACCEPTANCE.md
          git diff --cached --stat

      - name: Commit verified roadmap synchronization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Record Apache-2.0 owner acceptance"
          git push origin "HEAD:${PTAH_HEAD_REF}"
