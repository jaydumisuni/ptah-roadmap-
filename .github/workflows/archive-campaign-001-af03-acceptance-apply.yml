name: Archive Campaign 001 AF03 Acceptance Apply

on:
  pull_request:
    paths:
      - "tools/apply_af03_acceptance.py"
      - "tools/apply_af03_acceptance_v2.py"
      - ".github/workflows/archive-campaign-001-af03-acceptance-apply.yml"

permissions:
  contents: write

env:
  PTAH_HEAD_REF: ${{ github.event.pull_request.head.ref }}
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha }}

jobs:
  accept-af03:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out exact AF03 acceptance branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_HEAD_REF }}
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify exact starting head
        run: test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"

      - name: Apply guarded AF03 acceptance
        run: |
          mkdir -p conformance/reports/af03-acceptance
          set -o pipefail
          python3 tools/apply_af03_acceptance_v2.py 2>&1 \
            | tee conformance/reports/af03-acceptance/transform.txt

      - name: Run accepted-state validation
        run: |
          set -o pipefail
          python3 tools/test_check_archive_af03.py -v 2>&1 | tee conformance/reports/af03-acceptance/af03-tests.txt
          python3 tools/check_archive_af03.py --repo-root . 2>&1 | tee conformance/reports/af03-acceptance/af03-validator.txt
          python3 tools/test_check_archive_af02.py -v 2>&1 | tee conformance/reports/af03-acceptance/af02-tests.txt
          python3 tools/check_archive_af02.py --repo-root . 2>&1 | tee conformance/reports/af03-acceptance/af02-validator.txt
          python3 tools/test_check_archive_af01.py -v 2>&1 | tee conformance/reports/af03-acceptance/af01-tests.txt
          python3 tools/check_archive_af01.py --repo-root . 2>&1 | tee conformance/reports/af03-acceptance/af01-validator.txt
          python3 tools/test_check_archive_formation.py -v 2>&1 | tee conformance/reports/af03-acceptance/archive-tests.txt
          python3 tools/check_archive_formation.py --repo-root . 2>&1 | tee conformance/reports/af03-acceptance/archive-validator.txt
          python3 tools/test_check_platform_diagnostic_advisory.py -v 2>&1 | tee conformance/reports/af03-acceptance/diagnostic-tests.txt
          python3 tools/check_platform_diagnostic_advisory.py --repo-root . 2>&1 | tee conformance/reports/af03-acceptance/diagnostic-validator.txt
          python3 tools/test_check_master_plan_closure.py -v 2>&1 | tee conformance/reports/af03-acceptance/master-plan-tests.txt
          python3 tools/check_master_plan_closure.py --repo-root . 2>&1 | tee conformance/reports/af03-acceptance/master-plan-validator.txt

      - name: Upload acceptance diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: af03-acceptance-${{ env.PTAH_EXACT_SHA }}-${{ github.run_attempt }}
          path: conformance/reports/af03-acceptance/
          if-no-files-found: error
          retention-days: 30

      - name: Verify accepted state
        run: |
          grep -Fq 'Status: ACCEPTED COMPLETE' archive/campaign-001/af03/MISSION.md
          grep -Fq 'Status: ACCEPTED EVIDENCE RECORD' archive/campaign-001/af03/ACCEPTANCE.md
          grep -Fq -- '- accepted archive records: 29' archive/CAMPAIGN-001-FORMATION-MANIFEST.md
          grep -Fq -- '- completed formations: 3' archive/CAMPAIGN-001-FORMATION-MANIFEST.md
          grep -A5 '^## AF04$' archive/CAMPAIGN-001-FORMATION-MANIFEST.md | grep -Fq -- '- status: READY / NOT STARTED'
          grep -Fq 'AF03: ACCEPTED COMPLETE' CURRENT_STATE.md
          grep -Fq 'AF04: READY / NOT STARTED' CURRENT_STATE.md
          grep -Fq '**Runtime implementation:** NOT AUTHORIZED' CURRENT_STATE.md
          ! grep -Fq '**Runtime implementation:** AUTHORIZED' CURRENT_STATE.md
          grep -Fq 'Status: proposed' decisions/ADR-0033-FIRST-VERTICAL-SLICE-HOST-LICENCE-LAYOUT-BACKENDS.md
          grep -Fq '**Status:** COMPLETE AND FROZEN' DONOR_RECOVERY.md

      - name: Commit accepted authority records
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            AI_HANDOFF.md \
            CURRENT_STATE.md \
            PROGRESS.md \
            archive/CAMPAIGN-001-FORMATION-MANIFEST.md \
            archive/campaign-001/af03/ACCEPTANCE.md \
            archive/campaign-001/af03/MISSION.md \
            archive/campaign-001/af03/RESULT.json \
            archive/campaign-001/af03/RESULT.md \
            master-plan-index.json \
            tools/check_archive_af01.py \
            tools/check_archive_af02.py \
            tools/check_archive_af03.py \
            tools/check_archive_formation.py \
            tools/check_master_plan_closure.py \
            tools/check_platform_diagnostic_advisory.py \
            tools/test_check_archive_af02.py \
            tools/test_check_archive_af03.py \
            tools/test_check_archive_formation.py
          git commit -m "Accept Campaign 001 AF03 closure"
          git push origin "HEAD:${PTAH_HEAD_REF}"
