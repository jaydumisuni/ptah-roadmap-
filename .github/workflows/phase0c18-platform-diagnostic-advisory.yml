name: Phase 0C-18 Platform Diagnostic Advisory

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  diagnostic-advisory:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out exact diagnostic-advisory head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_EXACT_SHA }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify exact checked-out head
        run: test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"

      - name: Run adversarial regressions
        run: |
          mkdir -p conformance/reports/platform-diagnostic-advisory
          set -o pipefail
          python3 tools/test_check_platform_diagnostic_advisory.py -v 2>&1 \
            | tee conformance/reports/platform-diagnostic-advisory/regressions.txt

      - name: Validate candidate boundary
        run: |
          set -o pipefail
          python3 tools/check_platform_diagnostic_advisory.py \
            --repo-root . \
            --output conformance/reports/platform-diagnostic-advisory/report.json 2>&1 \
            | tee conformance/reports/platform-diagnostic-advisory/validator.txt

      - name: Bind evidence to exact head
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path("conformance/reports/platform-diagnostic-advisory")
          report_path = root / "report.json"
          report = json.loads(report_path.read_text(encoding="utf-8"))
          expected = os.environ["PTAH_EXACT_SHA"]
          checked_out = subprocess.run(
              ["git", "rev-parse", "HEAD"], capture_output=True, text=True, check=True
          ).stdout.strip()
          evidence = {
              "schema_version": "1.0.0",
              "record_type": "ptah.phase0c.platform_diagnostic_advisory_exact_head_evidence",
              "created_at": datetime.now(timezone.utc).isoformat(timespec="seconds"),
              "implementation_commit": expected,
              "checked_out_commit": checked_out,
              "exact_head_match": checked_out == expected,
              "validation_report_sha256": hashlib.sha256(report_path.read_bytes()).hexdigest(),
              **report,
          }
          (root / "exact-head-evidence.json").write_text(
              json.dumps(evidence, indent=2) + "\n", encoding="utf-8"
          )
          if not evidence["exact_head_match"]:
              raise SystemExit("diagnostic advisory did not test exact head")
          if evidence["status"] != "candidate_valid_non_authorizing":
              raise SystemExit("diagnostic advisory candidate status invalid")
          for key in (
              "uses_frozen_primitives_only",
              "may_detect_missing_capability",
              "may_detect_degradation",
              "may_request_upgrade",
          ):
              if evidence.get(key) is not True:
                  raise SystemExit(f"required diagnostic capability missing: {key}")
          for key in (
              "new_core_entity_required",
              "may_choose_caller_work",
              "may_approve_upgrade",
              "may_install_upgrade_autonomously",
              "may_block_unrelated_capable_work",
              "sergeant_review_authority_borrowed",
              "af03_started",
              "phase_0a_reopened",
              "adr_0033_accepted",
              "runtime_implementation_authorized",
          ):
              if evidence.get(key) is not False:
                  raise SystemExit(f"diagnostic boundary violated: {key}")
          PY

      - name: Upload exact-head evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: phase-0c-18-platform-diagnostic-advisory-${{ env.PTAH_EXACT_SHA }}-${{ github.run_attempt }}
          path: conformance/reports/platform-diagnostic-advisory/
          if-no-files-found: error
          retention-days: 30
