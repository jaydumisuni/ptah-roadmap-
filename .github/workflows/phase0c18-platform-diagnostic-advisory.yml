name: Phase 0C-18 Diagnostic and Worker Execution

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  diagnostic-worker-boundary:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out exact accepted head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_EXACT_SHA }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify exact checked-out head
        run: test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"

      - name: Run adversarial regressions
        run: |
          mkdir -p conformance/reports/platform-diagnostic-advisory
          set -o pipefail
          python3 tools/test_check_platform_diagnostic_advisory.py -v 2>&1 \
            | tee conformance/reports/platform-diagnostic-advisory/regressions.txt

      - name: Validate accepted boundary
        run: |
          set -o pipefail
          python3 tools/check_platform_diagnostic_advisory.py \
            --repo-root . \
            --output conformance/reports/platform-diagnostic-advisory/report.json 2>&1 \
            | tee conformance/reports/platform-diagnostic-advisory/validator.txt

      - name: Bind accepted evidence to exact head
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path("conformance/reports/platform-diagnostic-advisory")
          report_path = root / "report.json"
          report = json.loads(report_path.read_text(encoding="utf-8"))
          expected = os.environ["PTAH_EXACT_SHA"]
          checked_out = subprocess.run(
              ["git", "rev-parse", "HEAD"], capture_output=True, text=True, check=True
          ).stdout.strip()
          evidence = {
              "schema_version": "1.0.0",
              "record_type": "ptah.phase0c.platform_diagnostic_and_worker_execution_exact_head_evidence",
              "created_at": datetime.now(timezone.utc).isoformat(timespec="seconds"),
              "implementation_commit": expected,
              "checked_out_commit": checked_out,
              "exact_head_match": checked_out == expected,
              "validation_report_sha256": hashlib.sha256(report_path.read_bytes()).hexdigest(),
              **report,
          }
          (root / "exact-head-evidence.json").write_text(
              json.dumps(evidence, indent=2) + "\n", encoding="utf-8"
          )
          if not evidence["exact_head_match"]:
              raise SystemExit("diagnostic/worker boundary did not test exact head")
          if evidence["status"] != "accepted_valid_non_authorizing":
              raise SystemExit("diagnostic/worker accepted status invalid")
          expected_true = (
              "uses_frozen_primitives_only",
              "may_detect_missing_capability",
              "may_detect_degradation",
              "may_request_upgrade",
              "may_execute_caller_selected_ten_for_two",
              "caller_job_required",
              "caller_recipe_or_plan_required",
              "adr_0036_accepted",
              "phase0c_18_complete",
              "af03_accepted",
              "af03_started",
              "af03_authorized",
              "af04_accepted",
              "af04_started",
              "af04_authorized",
              "archive_campaign_complete",
          )
          for key in expected_true:
              if evidence.get(key) is not True:
                  raise SystemExit(f"required accepted capability or campaign state missing: {key}")
          expected_values = {
              "ten_for_two_multiplier": 10,
              "ten_for_two_minimum_worker_slots": 20,
              "protocol_version": "1.0.0",
              "candidate_exact_head": "d2608ba7c619c1c402091edd619a4b29813ee9a7",
              "candidate_workflow_run": "29986975197",
              "candidate_artifact_id": "8555395796",
              "candidate_artifact_digest": "sha256:72025fb0aa5a969ea73abe95d7352f7cf14f1c847943955bd768a46d964a4c61",
              "candidate_validation_report_sha256": "aff3a635d37b82c15eeb36f2f6cec780f76e2c3ce320727a18053b913b8d9171",
              "candidate_merge": "fbc4ee80284a2d7ea38a44fdbfa90f0348b875ae",
              "acceptance_record": "planning/PTAH-DIAGNOSTIC-WORKER-AUTHORITY-ACCEPTANCE.md",
          }
          for key, value in expected_values.items():
              if evidence.get(key) != value:
                  raise SystemExit(f"accepted diagnostic/worker evidence mismatch: {key}")
          expected_false = (
              "new_core_entity_required",
              "may_choose_caller_work",
              "may_invent_semantic_subtasks",
              "may_accept_worker_result",
              "may_approve_upgrade",
              "may_install_upgrade_autonomously",
              "may_block_unrelated_capable_work",
              "sergeant_review_authority_borrowed",
              "sergeant_mission_selection_borrowed",
              "af04_ready",
              "phase_0a_reopened",
              "adr_0033_accepted",
              "runtime_implementation_authorized",
          )
          for key in expected_false:
              if evidence.get(key) is not False:
                  raise SystemExit(f"accepted diagnostic/worker boundary violated: {key}")
          PY

      - name: Upload exact-head evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: phase-0c-18-diagnostic-worker-${{ env.PTAH_EXACT_SHA }}-${{ github.run_attempt }}
          path: conformance/reports/platform-diagnostic-advisory/
          if-no-files-found: error
          retention-days: 30
