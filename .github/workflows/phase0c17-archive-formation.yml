name: Phase 0C-17 Tenfold Archive Formation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  archive-formation:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out exact archive-formation head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_EXACT_SHA }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify exact checked-out head
        run: test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"

      - name: Run adversarial archive regressions
        run: |
          mkdir -p conformance/reports/archive-formation
          set -o pipefail
          python3 tools/test_check_archive_formation.py -v 2>&1 \
            | tee conformance/reports/archive-formation/regressions.txt

      - name: Validate archive formation package
        run: |
          set -o pipefail
          python3 tools/check_archive_formation.py \
            --repo-root . \
            --output conformance/reports/archive-formation/archive-formation-report.json \
            2>&1 | tee conformance/reports/archive-formation/validator-output.txt

      - name: Bind accepted evidence to exact head
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path("conformance/reports/archive-formation")
          report_path = root / "archive-formation-report.json"
          report = json.loads(report_path.read_text(encoding="utf-8"))
          master_index = json.loads(Path("master-plan-index.json").read_text(encoding="utf-8"))
          archive = master_index["operational_protocols"]["tenfold_archive_formation"]
          expected = os.environ["PTAH_EXACT_SHA"]
          checked_out = subprocess.run(
              ["git", "rev-parse", "HEAD"], capture_output=True, text=True, check=True
          ).stdout.strip()
          evidence = {
              "schema_version": "1.0.0",
              "record_type": "ptah.phase0c.archive_formation_exact_head_evidence",
              "created_at": datetime.now(timezone.utc).isoformat(timespec="seconds"),
              "implementation_commit": expected,
              "checked_out_commit": checked_out,
              "exact_head_match": checked_out == expected,
              "validation_report_sha256": hashlib.sha256(report_path.read_bytes()).hexdigest(),
              **report,
              "protocol_version": archive.get("protocol_version"),
              "adr_0035_accepted": archive.get("adr_0035_accepted"),
              "phase0c_17_complete": archive.get("phase0c_17_complete"),
              "af01_status": archive.get("af01_status"),
              "accepted_archive_record_count": archive.get("accepted_archive_record_count"),
              "candidate_exact_head": archive.get("candidate_exact_head"),
              "candidate_workflow_run": archive.get("candidate_workflow_run"),
              "candidate_artifact_id": archive.get("candidate_artifact_id"),
              "candidate_artifact_digest": archive.get("candidate_artifact_digest"),
              "candidate_merge": archive.get("candidate_merge"),
              "accepted_state_exact_head": archive.get("accepted_state_exact_head"),
              "accepted_state_workflow_run": archive.get("accepted_state_workflow_run"),
              "accepted_state_artifact_id": archive.get("accepted_state_artifact_id"),
              "accepted_state_artifact_digest": archive.get("accepted_state_artifact_digest"),
              "accepted_state_validation_report_sha256": archive.get("accepted_state_validation_report_sha256"),
              "operative_acceptance_merge": archive.get("operative_acceptance_merge"),
              "acceptance_record": archive.get("acceptance_record"),
          }
          (root / "exact-head-evidence.json").write_text(
              json.dumps(evidence, indent=2) + "\n", encoding="utf-8"
          )
          if not evidence["exact_head_match"]:
              raise SystemExit("archive formation did not test the exact head")
          if evidence["status"] != "accepted_valid_non_authorizing":
              raise SystemExit("accepted archive formation validation status is invalid")
          expected_values = {
              "private_force_multiplier": 10,
              "minimum_private_force": 20,
              "formation_count": 10,
              "allocated_private_count": 200,
              "assigned_record_count": 98,
              "external_record_count": 69,
              "internal_record_count": 29,
              "primary_worker_slots": 100,
              "verifier_worker_slots": 100,
              "reserve_pair_count": 2,
              "protocol_version": "1.0.0",
              "af01_status": "ready_not_started",
              "accepted_archive_record_count": 0,
              "candidate_exact_head": "58b577b6793ec28de084e6d712c3c1e88bfe2d3a",
              "candidate_workflow_run": "29853954659",
              "candidate_artifact_id": "8504497355",
              "candidate_artifact_digest": "sha256:936740e8087e6f7f0a58b3d731117fcb9a4861edfd20c396fb1bb20a7d4f18f4",
              "candidate_merge": "c4973cbf4d02a34f14a7aefa85b8e2ea7b392752",
              "accepted_state_exact_head": "b96b84d17cf03e905bd0b1baf3c46b8aec09334a",
              "accepted_state_workflow_run": "29855000427",
              "accepted_state_artifact_id": "8504901567",
              "accepted_state_artifact_digest": "sha256:9d96a1f299060e50ab63132d1bb1da0903d5435f73acdf4fa9e394cdcccf21d2",
              "accepted_state_validation_report_sha256": "21d5338a7049dbc3a3af2e684efa21e19c281c52355007346291c74dfb7a1d3a",
              "operative_acceptance_merge": "40ca127c6d3054bda785061090acefaefcf4cd42",
              "acceptance_record": "planning/TENFOLD-ARCHIVE-AUTHORITY-ACCEPTANCE-MERGE.md",
          }
          for key, value in expected_values.items():
              if evidence.get(key) != value:
                  raise SystemExit(f"accepted archive formation mismatch: {key}")
          for key in ("authority_sync_complete", "adr_0035_accepted", "phase0c_17_complete"):
              if evidence.get(key) is not True:
                  raise SystemExit(f"accepted archive authority missing: {key}")
          for key in (
              "phase_0a_reopened",
              "adr_0033_accepted",
              "runtime_implementation_authorized",
          ):
              if evidence.get(key) is not False:
                  raise SystemExit(f"non-authorizing boundary violated: {key}")
          PY

      - name: Upload exact-head archive evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: phase-0c-17-archive-formation-${{ env.PTAH_EXACT_SHA }}-${{ github.run_attempt }}
          path: conformance/reports/archive-formation/
          if-no-files-found: error
          retention-days: 30
