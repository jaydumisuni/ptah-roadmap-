name: Archive Campaign 001 AF02 Acceptance Sync

on:
  pull_request:
    paths:
      - "tools/apply_archive_af02_acceptance_sync.py"
      - "tools/run_archive_af02_acceptance_sync.py"
      - ".github/workflows/archive-campaign-001-af02-acceptance-sync.yml"

permissions:
  contents: write

env:
  PTAH_HEAD_REF: ${{ github.event.pull_request.head.ref }}
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha }}

jobs:
  synchronize-af02-acceptance:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out exact acceptance branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_HEAD_REF }}
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify exact starting head
        run: test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"

      - name: Apply guarded AF02 acceptance synchronization
        run: python3 tools/run_archive_af02_acceptance_sync.py

      - name: Run synchronized validators
        run: |
          mkdir -p conformance/reports/archive-campaign-001-af02-acceptance-sync
          set -o pipefail
          python3 tools/test_check_archive_af02.py -v 2>&1 | tee conformance/reports/archive-campaign-001-af02-acceptance-sync/af02-regressions.txt
          python3 tools/check_archive_af02.py --repo-root . 2>&1 | tee conformance/reports/archive-campaign-001-af02-acceptance-sync/af02-validator.txt
          python3 tools/test_check_archive_af01.py -v 2>&1 | tee conformance/reports/archive-campaign-001-af02-acceptance-sync/af01-regressions.txt
          python3 tools/check_archive_af01.py --repo-root . 2>&1 | tee conformance/reports/archive-campaign-001-af02-acceptance-sync/af01-validator.txt
          python3 tools/test_check_archive_formation.py -v 2>&1 | tee conformance/reports/archive-campaign-001-af02-acceptance-sync/formation-regressions.txt
          python3 tools/check_archive_formation.py --repo-root . 2>&1 | tee conformance/reports/archive-campaign-001-af02-acceptance-sync/formation-validator.txt

      - name: Verify changed-file boundary
        run: |
          expected=$(cat <<'EOF'
          AI_HANDOFF.md
          CURRENT_STATE.md
          PROGRESS.md
          archive/CAMPAIGN-001-FORMATION-MANIFEST.md
          archive/campaign-001/af01/ACCEPTANCE.md
          archive/campaign-001/af02/ACCEPTANCE.md
          archive/campaign-001/af02/MISSION.md
          archive/campaign-001/af02/RESULT.json
          archive/campaign-001/af02/RESULT.md
          master-plan-index.json
          tools/check_archive_af01.py
          tools/check_archive_af02.py
          tools/check_archive_formation.py
          tools/test_check_archive_af02.py
          tools/test_check_archive_formation.py
          EOF
          )
          actual=$(git status --short | awk '{print $2}' | grep -v '^conformance/' | sort)
          test "$actual" = "$(printf '%s\n' "$expected" | sort)"
          grep -Fq 'AF02: ACCEPTED COMPLETE' CURRENT_STATE.md
          grep -Fq 'AF03: READY / NOT STARTED' CURRENT_STATE.md
          grep -Fq '**Runtime implementation:** NOT AUTHORIZED' CURRENT_STATE.md
          ! grep -Fq '**Runtime implementation:** AUTHORIZED' CURRENT_STATE.md
          grep -Fq 'Status: proposed' decisions/ADR-0033-FIRST-VERTICAL-SLICE-HOST-LICENCE-LAYOUT-BACKENDS.md
          grep -Fq '**Status:** COMPLETE AND FROZEN' DONOR_RECOVERY.md

      - name: Commit synchronized accepted state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            AI_HANDOFF.md \
            CURRENT_STATE.md \
            PROGRESS.md \
            archive/CAMPAIGN-001-FORMATION-MANIFEST.md \
            archive/campaign-001/af01/ACCEPTANCE.md \
            archive/campaign-001/af02/ACCEPTANCE.md \
            archive/campaign-001/af02/MISSION.md \
            archive/campaign-001/af02/RESULT.json \
            archive/campaign-001/af02/RESULT.md \
            master-plan-index.json \
            tools/check_archive_af01.py \
            tools/check_archive_af02.py \
            tools/check_archive_formation.py \
            tools/test_check_archive_af02.py \
            tools/test_check_archive_formation.py
          git commit -m "Accept Campaign 001 AF02 closure"
          git push origin "HEAD:${PTAH_HEAD_REF}"

      - name: Upload synchronization diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: archive-campaign-001-af02-acceptance-sync-${{ env.PTAH_EXACT_SHA }}-${{ github.run_attempt }}
          path: conformance/reports/archive-campaign-001-af02-acceptance-sync/
          if-no-files-found: warn
          retention-days: 30
