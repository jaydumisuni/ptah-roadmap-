name: Neutral Ptah Substrate Plan Correction Apply

on:
  pull_request:
    paths:
      - "tools/apply_neutral_substrate_plan_correction.py"
      - "tools/apply_neutral_substrate_plan_correction_v2.py"
      - "tools/apply_neutral_substrate_plan_correction_v3.py"
      - ".github/workflows/neutral-substrate-plan-correction-apply.yml"

permissions:
  contents: write

env:
  PTAH_HEAD_REF: ${{ github.event.pull_request.head.ref }}
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha }}

jobs:
  apply-correction:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out exact correction branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_HEAD_REF }}
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify exact starting head
        run: test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"

      - name: Apply guarded plan correction
        run: |
          mkdir -p conformance/reports/neutral-substrate-correction
          set -o pipefail
          python3 tools/apply_neutral_substrate_plan_correction_v3.py 2>&1 \
            | tee conformance/reports/neutral-substrate-correction/transform.txt

      - name: Run accepted plan validation
        run: |
          set -o pipefail
          python3 tools/test_check_master_plan_closure.py -v 2>&1 \
            | tee conformance/reports/neutral-substrate-correction/regressions.txt
          python3 tools/check_master_plan_closure.py \
            --repo-root . \
            --output conformance/reports/neutral-substrate-correction/report.json 2>&1 \
            | tee conformance/reports/neutral-substrate-correction/validator.txt

      - name: Verify changed-file boundary
        run: |
          expected=$(cat <<'EOF'
          AI_HANDOFF.md
          CURRENT_STATE.md
          IMPLEMENTATION_ROADMAP.md
          MASTER_PLAN.md
          PROGRESS.md
          master-plan-index.json
          tools/check_master_plan_closure.py
          tools/test_check_master_plan_closure.py
          work-packages/PHASE-0C-15-AI-PROJECT-WORKSPACE-DONOR-AND-HUNTER-BRIDGE.md
          EOF
          )
          actual=$(git diff --name-only | sort)
          test "$actual" = "$(printf '%s\n' "$expected" | sort)"
          grep -Fq 'Ptah is the world, not the thinker' MASTER_PLAN.md
          grep -Fq 'Ptah does not select context, rank authority, infer blockers, approve work or choose a next action' MASTER_PLAN.md
          ! grep -Fq 'Before an agent participates, Ptah compiles a bounded packet' MASTER_PLAN.md
          grep -Fq 'D02 — AI Project Workspace substrate and application adapters' IMPLEMENTATION_ROADMAP.md
          ! grep -Fq 'D02 — AI Project Workspace and context compiler' IMPLEMENTATION_ROADMAP.md
          grep -Fq '**Runtime implementation:** NOT AUTHORIZED' CURRENT_STATE.md
          ! grep -Fq '**Runtime implementation:** AUTHORIZED' CURRENT_STATE.md
          ! grep -Fq 'AF02 evidence collection is active' CURRENT_STATE.md
          grep -Fq 'AF03 remains ready but not started' CURRENT_STATE.md
          grep -Fq 'Status: proposed' decisions/ADR-0033-FIRST-VERTICAL-SLICE-HOST-LICENCE-LAYOUT-BACKENDS.md
          grep -Fq 'COMPLETE AND FROZEN' DONOR_RECOVERY.md

      - name: Upload correction diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: neutral-substrate-plan-correction-${{ env.PTAH_EXACT_SHA }}-${{ github.run_attempt }}
          path: conformance/reports/neutral-substrate-correction/
          if-no-files-found: error
          retention-days: 30

      - name: Commit corrected authority records
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            AI_HANDOFF.md \
            CURRENT_STATE.md \
            IMPLEMENTATION_ROADMAP.md \
            MASTER_PLAN.md \
            PROGRESS.md \
            master-plan-index.json \
            tools/check_master_plan_closure.py \
            tools/test_check_master_plan_closure.py \
            work-packages/PHASE-0C-15-AI-PROJECT-WORKSPACE-DONOR-AND-HUNTER-BRIDGE.md
          git commit -m "Restore neutral Ptah substrate plan boundary"
          git push origin "HEAD:${PTAH_HEAD_REF}"
