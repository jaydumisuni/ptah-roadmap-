name: Archive Protocol AF01 Progress Sync

on:
  pull_request:
    paths:
      - "tools/apply_archive_protocol_af01_progress_sync.py"
      - ".github/workflows/archive-protocol-af01-progress-sync.yml"

permissions:
  contents: write

env:
  PTAH_HEAD_REF: ${{ github.event.pull_request.head.ref }}
  PTAH_EXACT_SHA: ${{ github.event.pull_request.head.sha }}

jobs:
  synchronize-archive-protocol-progress:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out exact progress-sync branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.PTAH_HEAD_REF }}
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify exact starting head
        run: test "$(git rev-parse HEAD)" = "$PTAH_EXACT_SHA"

      - name: Apply guarded archive-protocol synchronization
        run: python3 tools/apply_archive_protocol_af01_progress_sync.py

      - name: Run archive-protocol regressions and validator
        run: |
          python3 tools/test_check_archive_formation.py -v
          python3 tools/check_archive_formation.py --repo-root .

      - name: Verify changed-file boundary
        run: |
          expected=$(cat <<'EOF'
          tools/check_archive_formation.py
          tools/test_check_archive_formation.py
          EOF
          )
          actual=$(git diff --name-only | sort)
          test "$actual" = "$(printf '%s\n' "$expected" | sort)"
          grep -Fq 'accepted_operational_protocol_af01_complete_af02_ready' tools/check_archive_formation.py
          grep -Fq 'AF02 is READY / NOT STARTED' PROGRESS.md
          grep -Fq '**Runtime implementation:** NOT AUTHORIZED' CURRENT_STATE.md
          ! grep -Fq '**Runtime implementation:** AUTHORIZED' CURRENT_STATE.md

      - name: Commit synchronized governing validators
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/check_archive_formation.py tools/test_check_archive_formation.py
          git commit -m "Validate archive campaign after AF01 closure"
          git push origin "HEAD:${PTAH_HEAD_REF}"
